services:
  # Backend API + pg-boss worker (single persistent process)
  - type: web
    name: tiffinbox-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build && cp -r src/db/migrations dist/db/migrations
    startCommand: node dist/db/migrate.js && node dist/db/seed.js && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Database (Neon PostgreSQL)
      - key: DATABASE_URL
        sync: false
      # Auth
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://tiffinbox-api.onrender.com/api/auth/google/callback
      # Admin seed (first deploy only — safe to re-run, seed is idempotent)
      - key: ADMIN_SEED_EMAIL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      # Razorpay
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # Email (Gmail SMTP)
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      # URLs
      - key: FRONTEND_URL
        value: https://tiffinbox-web.onrender.com
      # Cloudinary (image uploads — optional)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Sentry error tracking (optional)
      - key: SENTRY_DSN
        sync: false

  # Frontend static site
  - type: web
    name: tiffinbox-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://tiffinbox-api.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
      - key: VITE_APP_NAME
        value: TiffinBox
