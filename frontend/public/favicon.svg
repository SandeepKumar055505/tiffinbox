<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="256" rx="108" fill="url(#shine)"/>
  
  <!-- Tiffin container body -->
  <!-- Bottom container -->
  <rect x="136" y="300" width="240" height="80" rx="16" fill="white"/>
  <!-- Middle container -->
  <rect x="136" y="208" width="240" height="80" rx="16" fill="white" opacity="0.92"/>
  <!-- Top container (lid) -->
  <rect x="136" y="130" width="240" height="66" rx="16" fill="white" opacity="0.84"/>
  
  <!-- Lid knob/handle -->
  <rect x="216" y="104" width="80" height="26" rx="13" fill="white"/>
  
  <!-- Separator lines -->
  <line x1="160" y1="288" x2="352" y2="288" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="160" y1="196" x2="352" y2="196" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

  <!-- Steam wisps -->
  <path d="M200 90 Q205 70 200 50" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M256 82 Q261 58 256 38" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M312 90 Q317 70 312 50" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>
  
  <!-- Location pin dot (brand mark) -->
  <circle cx="380" cy="396" r="16" fill="white" opacity="0.3"/>
  <circle cx="380" cy="396" r="8" fill="white" opacity="0.6"/>
</svg>
